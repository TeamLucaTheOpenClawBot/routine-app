name: Docker (build · smoke · publish)

# PR: 이미지 빌드 + 컨테이너 스모크 테스트(서빙·PWA 헤더 검증)만.
# main 푸시(머지): 동일 검증 후 GHCR에 publish → 서버의 watchtower가 자동 반영.
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  # PR 런은 새 커밋이 오면 취소해도 되지만, main 런 취소는 진행 중인 프로덕션 배포를
  # 죽일 수 있다 → main은 취소 대신 큐잉.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  IMAGE: ghcr.io/teamlucatheopenclawbot/routine-app

jobs:
  docker:
    name: image · smoke${{ github.ref == 'refs/heads/main' && ' · publish' || '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 배포 서버(Oracle Ampere)가 aarch64 → arm64 크로스빌드용 QEMU.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: routine-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 실제 컨테이너를 띄워 서빙과 PWA 캐시 규칙을 검증한다.
      - name: Smoke test
        run: |
          docker run -d --rm -p 8080:80 --name app routine-app:ci
          for i in $(seq 1 30); do curl -fsS http://localhost:8080/ >/dev/null 2>&1 && break; sleep 0.5; done
          set -x
          curl -fsS http://localhost:8080/ | grep -q '<div id="root">'
          curl -fsSI http://localhost:8080/sw.js | grep -i 'cache-control: no-cache'
          curl -fsSI http://localhost:8080/index.html | grep -i 'cache-control: no-cache'
          curl -fsSI http://localhost:8080/manifest.webmanifest | grep -i 'content-type: application/manifest+json'
          ASSET=$(curl -fsS http://localhost:8080/ | grep -oE '/assets/[^"]+\.js' | head -1)
          curl -fsSI "http://localhost:8080$ASSET" | grep -i 'cache-control: .*immutable'
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/no-such-path)" = "200"
          docker stop app

      # main 이외의 ref(feature 브랜치 workflow_dispatch 포함)에선 절대 publish하지 않는다 —
      # latest로 push되면 watchtower가 미머지 코드를 프로덕션에 배포해버린다.
      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # 서버(aarch64)와 일반(amd64) 둘 다 pull 가능하게 멀티아치로 publish.
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha

  # main publish 후 서버에 즉시 반영(push 배포). GHCR은 private 유지 —
  # 1회용 GITHUB_TOKEN을 stdin으로 넘겨 pull하고 바로 logout하므로 서버에 영구 자격증명이 없다.
  deploy:
    name: deploy to server
    needs: docker
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # 서버로 넘기는 GITHUB_TOKEN은 pull만 하면 되므로 잡 레벨에서 read로 강등(최소권한).
    permissions:
      contents: read
      packages: read
    concurrency:
      group: deploy-server
      cancel-in-progress: false
    steps:
      - name: SSH deploy (ephemeral GHCR login → pull → up)
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # 호스트 키 핀닝: keyscan(그 순간의 키를 무조건 신뢰) 대신 시크릿에 고정한 서버
          # 정본 키만 신뢰한다 — DNS/경로 스푸핑·키 교체 시 토큰 전송 전에 접속이 실패한다.
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          # 토큰은 argv에 노출하지 않고 stdin → docker login --password-stdin 으로만 전달.
          # trap: pull/up이 실패해도 logout이 반드시 실행돼 자격증명이 서버에 남지 않는다.
          # --remove-orphans: compose에서 제거된 서비스(구 watchtower 등)를 함께 정리.
          echo "$TOKEN" | ssh -o StrictHostKeyChecking=yes -i ~/.ssh/deploy_key "$SSH_USER@$HOST" \
            "set -e; trap 'docker logout ghcr.io >/dev/null 2>&1 || true' EXIT; \
             docker login ghcr.io -u '$ACTOR' --password-stdin; \
             cd /opt/routine-app; \
             docker compose pull -q routine-app; \
             docker compose up -d --remove-orphans routine-app; \
             docker image prune -f >/dev/null; \
             echo 'deployed:'; docker ps --filter name=routine-app --format '{{.Image}} {{.Status}}'"
