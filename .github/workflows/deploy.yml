name: Docker (build · smoke · publish)

# PR: 이미지 빌드 + 컨테이너 스모크 테스트(서빙·PWA 헤더 검증)만.
# main 푸시(머지): 동일 검증 후 GHCR에 publish → CI가 서버로 SSH 접속해 pull·재기동(push 배포).
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.ref }}
  # PR 런은 새 커밋이 오면 취소해도 되지만, main 런 취소는 진행 중인 프로덕션 배포를
  # 죽일 수 있다 → main은 취소 대신 큐잉.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  IMAGE: ghcr.io/teamlucatheopenclawbot/routine-app
  API_IMAGE: ghcr.io/teamlucatheopenclawbot/routine-app-api

jobs:
  docker:
    name: image · smoke${{ github.ref == 'refs/heads/main' && ' · publish' || '' }}
    runs-on: ubuntu-latest
    # 행이 걸려도 분 소모에 상한을 둔다 — #20의 70분 런 재발 방지. 정상 런은 수 분이면 끝난다.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      # 배포 서버(Oracle Ampere)가 aarch64 → arm64 크로스빌드용 QEMU.
      # 단 빌드 스테이지는 Dockerfile의 --platform=$BUILDPLATFORM로 네이티브에 고정돼 있어
      # QEMU가 실제로 돌리는 건 nginx 스테이지의 COPY뿐이다(#20).
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: routine-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build API image (local)
        uses: docker/build-push-action@v6
        with:
          context: ./server
          load: true
          tags: routine-app-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # API는 fail-closed다 — Access 설정 없이는 기동하지 않고, 설정이 있어도 유효한 JWT 없이는 401.
      # 두 성질을 실제 컨테이너로 확인한다(#7).
      - name: API smoke test
        run: |
          set -x
          # 1) 설정 없이 기동하면 즉시 종료해야 한다(설정 누락이 무인증 공개로 이어지지 않도록).
          #    종료 코드를 정확히 본다: `! docker run`으로 뭉뚱그리면 fail-closed가 깨져 서버가
          #    계속 떠 있어도 timeout(124)이 실패로 잡혀 통과해버린다 — 1이어야만 통과.
          set +e
          timeout 20 docker run --rm routine-app-api:ci
          code=$?
          set -e
          test "$code" = "1"
          # 2) 설정이 있으면 뜨고, health는 무인증 200
          docker run -d --rm -p 8081:8081 --name api \
            -e ACCESS_TEAM_DOMAIN=https://example.cloudflareaccess.com -e ACCESS_AUD=test-aud \
            routine-app-api:ci
          for i in $(seq 1 30); do curl -fsS http://localhost:8081/api/health >/dev/null 2>&1 && break; sleep 0.5; done
          curl -fsS http://localhost:8081/api/health | grep -q '"status":"ok"'
          # 3) 토큰 없이 보호 경로에 접근하면 401
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8081/api/me)" = "401"
          docker stop api

      # 실제 컨테이너를 띄워 서빙과 PWA 캐시 규칙을 검증한다.
      - name: Smoke test
        run: |
          docker run -d --rm -p 8080:80 --name app routine-app:ci
          for i in $(seq 1 30); do curl -fsS http://localhost:8080/ >/dev/null 2>&1 && break; sleep 0.5; done
          set -x
          curl -fsS http://localhost:8080/ | grep -q '<div id="root">'
          curl -fsSI http://localhost:8080/sw.js | grep -i 'cache-control: no-cache'
          curl -fsSI http://localhost:8080/index.html | grep -i 'cache-control: no-cache'
          curl -fsSI http://localhost:8080/manifest.webmanifest | grep -i 'content-type: application/manifest+json'
          ASSET=$(curl -fsS http://localhost:8080/ | grep -oE '/assets/[^"]+\.js' | head -1)
          curl -fsSI "http://localhost:8080$ASSET" | grep -i 'cache-control: .*immutable'
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/no-such-path)" = "200"
          docker stop app

      # main 이외의 ref(feature 브랜치 workflow_dispatch 포함)에선 절대 publish하지 않는다 —
      # latest로 push되면 다음 배포가 미머지 코드를 프로덕션에 올려버린다.
      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # 서버(aarch64)와 일반(amd64) 둘 다 pull 가능하게 멀티아치로 publish.
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          # cache-to가 없으면 arm64 레이어가 매번 처음부터 재빌드된다(#20).
          cache-to: type=gha,mode=max

      - name: Publish API to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # main publish 후 서버에 즉시 반영(push 배포). GHCR은 private 유지 —
  # 1회용 GITHUB_TOKEN을 stdin으로 넘겨 pull하고 바로 logout하므로 서버에 영구 자격증명이 없다.
  deploy:
    name: deploy to server
    needs: docker
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # SSH 접속이 매달려도 무한정 붙들지 않게(#20).
    timeout-minutes: 10
    # 서버로 넘기는 GITHUB_TOKEN은 pull만 하면 되므로 잡 레벨에서 read로 강등(최소권한).
    permissions:
      contents: read
      packages: read
    concurrency:
      group: deploy-server
      cancel-in-progress: false
    steps:
      # compose 파일을 서버로 실어 보내야 하므로 레포가 필요하다.
      - uses: actions/checkout@v4

      - name: SSH deploy (ephemeral GHCR login → pull → up)
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
          KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # 호스트 키 핀닝: keyscan(그 순간의 키를 무조건 신뢰) 대신 시크릿에 고정한 서버
          # 정본 키만 신뢰한다 — DNS/경로 스푸핑·키 교체 시 토큰 전송 전에 접속이 실패한다.
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/known_hosts
          # compose 파일을 레포에서 서버로 동기화한다. 이전에는 1회 수동 배치라 레포에 서비스를
          # 추가해도 서버에 영영 반영되지 않았다(#7 리뷰에서 발견) — 레포를 단일 원본으로 만든다.
          # `.env`(Access 값)는 서버에만 두고 건드리지 않는다.
          scp -o StrictHostKeyChecking=yes -i ~/.ssh/deploy_key \
            deploy/docker-compose.yml "$SSH_USER@$HOST:/opt/routine-app/docker-compose.yml"
          # 토큰은 argv에 노출하지 않고 stdin → docker login --password-stdin 으로만 전달.
          # trap: pull/up이 실패해도 logout이 반드시 실행돼 자격증명이 서버에 남지 않는다.
          # --remove-orphans: compose에서 제거된 서비스(구 watchtower 등)를 함께 정리.
          # pull에 --profile api를 주는 이유: GHCR이 private이라 배포 중(로그인 상태)에 받아두지
          # 않으면, 사용자가 나중에 .env로 API를 켤 때 자격증명이 없어 pull이 실패한다
          # (배포 끝에 logout하므로). up은 --profile 없이 두어 .env의 COMPOSE_PROFILES를 따른다.
          # 롤백 보존은 시간이 아니라 태그로: pull 전에 현재 latest를 :previous로 재태그해두면
          # 태그가 붙어 있어 prune(dangling 전용)에서 살아남는다 — 배포 간격과 무관하게 직전
          # 이미지 1개가 항상 보존되고, 그 이전 것만 dangling이 되어 정리된다.
          echo "$TOKEN" | ssh -o StrictHostKeyChecking=yes -i ~/.ssh/deploy_key "$SSH_USER@$HOST" \
            "set -e; trap 'docker logout ghcr.io >/dev/null 2>&1 || true' EXIT; \
             docker login ghcr.io -u '$ACTOR' --password-stdin; \
             cd /opt/routine-app; \
             if [ -e .env ] && [ ! -r .env ]; then \
               echo 'ERROR: .env가 배포 사용자에게 읽히지 않습니다(root 소유 추정).'; \
               echo '  compose가 COMPOSE_PROFILES/ACCESS_*를 못 읽어 API가 조용히 빠집니다.'; \
               echo '  해결: sudo chown '"$SSH_USER"' /opt/routine-app/.env'; \
               exit 1; \
             fi; \
             docker tag ghcr.io/teamlucatheopenclawbot/routine-app:latest ghcr.io/teamlucatheopenclawbot/routine-app:previous 2>/dev/null || true; \
             docker tag ghcr.io/teamlucatheopenclawbot/routine-app-api:latest ghcr.io/teamlucatheopenclawbot/routine-app-api:previous 2>/dev/null || true; \
             docker compose --profile api pull -q; \
             docker compose up -d --remove-orphans; \
             docker image prune -f >/dev/null; \
             echo 'deployed:'; docker ps --filter name=routine-app --format '{{.Image}} {{.Status}}'"
