name: CI

on:
  pull_request:
  push:
    branches: [main]

# 동일 브랜치/PR 의 이전 실행은 취소(자원 절약).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: unit · build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 순수 로직(appLogic) + App 구동 렌더 테스트 (vitest · jsdom, DB 불필요).
      - name: Unit tests
        run: npm test

      # 프로덕션 번들이 실제로 빌드되는지(런타임 import·JSX 오류 조기 차단).
      - name: Build
        run: npm run build
