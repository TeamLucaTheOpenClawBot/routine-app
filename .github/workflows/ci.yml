name: CI

on:
  pull_request:
  push:
    branches: [main]

# 동일 브랜치/PR 의 이전 실행은 취소(자원 절약).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: unit · build
    runs-on: ubuntu-latest
    # 행 걸린 런이 분을 무제한 태우지 않게 상한(#20). 정상 런은 30초대.
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # API 이미지(server/Dockerfile)의 node:24-alpine과 맞춘다.
          # 20에서는 server/가 쓰는 node:sqlite(22.5+)가 없어 테스트가 깨진다 —
          # CI 런타임이 배포 런타임보다 낮으면 이런 차이가 머지 후에야 드러난다.
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 순수 로직(appLogic) + App 구동 렌더 테스트 (vitest · jsdom, DB 불필요).
      - name: Unit tests
        run: npm test

      # 프로덕션 번들이 실제로 빌드되는지(런타임 import·JSX 오류 조기 차단).
      - name: Build
        run: npm run build
