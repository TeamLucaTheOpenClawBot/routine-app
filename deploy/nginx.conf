# routine-app 정적 서빙 (컨테이너 내부 80 포트).
# PWA 핵심 캐시 규칙:
#  - sw.js/registerSW.js/index.html/manifest → no-cache (배포 업데이트가 즉시 전파되도록)
#  - /assets/* (해시 파일명) → 1년 불변 캐시
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json application/manifest+json image/svg+xml;
    gzip_min_length 1024;

    # 동기화 API(#7) — 컨테이너 네트워크의 api 서비스로 프록시.
    # SPA fallback(location /)보다 먼저 매칭돼야 한다. 여기가 index.html로 새면 클라이언트가
    # HTML을 JSON으로 파싱하려 들어 동기화가 조용히 깨진다.
    location /api/ {
        # upstream을 **변수로** 지정해 DNS 해석을 요청 시점으로 미룬다.
        # 리터럴로 쓰면 nginx가 기동 시 이름을 해석하고, API 컨테이너가 없을 때 해석 실패로
        # **nginx 자체가 뜨지 않아 프론트까지 내려간다**. 변수 + resolver면 API가 없을 때
        # 그 요청만 502가 되고 앱은 정상 서빙된다(Access 설정 전 기간을 안전하게 넘기기 위함).
        resolver 127.0.0.11 valid=10s ipv6=off; # Docker 내장 DNS
        set $api_upstream http://routine-app-api:8081;
        proxy_pass $api_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        # Cloudflare Access가 붙이는 JWT. 이게 유실되면 API가 전부 401이 된다.
        proxy_set_header Cf-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 동기화 응답은 절대 캐시하지 않는다.
        add_header Cache-Control "no-store" always;
    }

    # 해시된 빌드 자산: 불변 캐시
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # 업데이트 전파 경로: 항상 재검증. 여기가 오래 캐시되면 새 배포가 사용자에게 안 퍼진다.
    location = /sw.js { add_header Cache-Control "no-cache"; }
    location = /registerSW.js { add_header Cache-Control "no-cache"; }
    location = /index.html { add_header Cache-Control "no-cache"; }
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        add_header Cache-Control "no-cache";
    }

    # 아이콘 등 public 정적물: 하루 캐시
    location ~* \.(png|ico|svg)$ {
        add_header Cache-Control "public, max-age=86400";
    }

    # SPA fallback (현재 클라이언트 라우팅은 없지만 새로고침/딥링크 안전망)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
